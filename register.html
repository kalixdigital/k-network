<!DOCTYPE html>
<html>
<head>
    <title>K-NETWORK Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="register-container">

    <h1>Join K-NETWORK</h1>
    
<form id="registerForm">

    <input id="fullName" type="text" placeholder="Full Name" required>

    <input id="phone" type="tel" placeholder="Phone Number" required>

    <input id="opay" type="tel" placeholder="OPay Number" required>

    <input id="password" type="password" placeholder="Password" required>

    <input id="referralCode" type="text" placeholder="Referral Code (Optional)">

    <button type="submit">
        Register
    </button>

</form>
</div>




<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="script.js"></script>
</body>
</html>
